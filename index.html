<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>space cat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; cursor: pointer; background: #000008; }
  canvas { display: block; }

  #stars-bg {
    position: fixed; inset: 0;
    background: url('stars.png') center/cover no-repeat;
    z-index: 0; opacity: 0.9;
    transition: transform 0.1s linear;
  }
  #stars-fg {
    position: fixed; inset: 0;
    background: url('stars2.png') center/cover no-repeat;
    z-index: 0; opacity: 0.45;
    mix-blend-mode: screen;
    transition: transform 0.1s linear;
  }
  #canvas-wrap { position: fixed; inset: 0; z-index: 1; }

  #hint {
    position: fixed; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.22);
    font-family: 'Georgia', serif; font-size: 12px;
    letter-spacing: 0.35em; text-transform: uppercase;
    pointer-events: none; z-index: 10;
    transition: opacity 1.5s ease; user-select: none;
  }
  #hint.gone { opacity: 0; }

  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #000008; z-index: 99;
    color: rgba(255,255,255,0.2);
    font-family: 'Georgia', serif; font-size: 12px;
    letter-spacing: 0.35em; text-transform: uppercase;
    transition: opacity 1s ease;
  }
  #loading.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="stars-bg"></div>
<div id="stars-fg"></div>
<div id="canvas-wrap"></div>
<div id="loading">loading...</div>
<div id="hint">click anywhere</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.3;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x000000, 0);
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(38, window.innerWidth / window.innerHeight, 0.01, 200);
camera.position.set(0, 1.4, 5.5);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.enableZoom = false; controls.enablePan = false;
controls.minPolarAngle = Math.PI * 0.25; controls.maxPolarAngle = Math.PI * 0.65;
controls.minAzimuthAngle = -Math.PI * 0.35; controls.maxAzimuthAngle = Math.PI * 0.35;
controls.target.set(0, 1.1, 0); controls.update();

// Lights
scene.add(new THREE.AmbientLight(0xc0d8ff, 3.0));
const key = new THREE.DirectionalLight(0xffeedd, 4.5);
key.position.set(-2, 5, 3); key.castShadow = true;
key.shadow.mapSize.setScalar(1024);
key.shadow.camera.left=-3; key.shadow.camera.right=3;
key.shadow.camera.top=4; key.shadow.camera.bottom=-2;
key.shadow.bias = -0.001; scene.add(key);
const fill = new THREE.DirectionalLight(0x8ab4ff, 2.0);
fill.position.set(3, 2, 1); scene.add(fill);
const front = new THREE.DirectionalLight(0xffffff, 1.5);
front.position.set(0, 1, 6); scene.add(front);
const rim = new THREE.DirectionalLight(0x6688ff, 1.0);
rim.position.set(0, 4, -5); scene.add(rim);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 20),
  new THREE.MeshStandardMaterial({ color: 0x050510, roughness: 1, transparent: true, opacity: 0.5 })
);
ground.rotation.x = -Math.PI / 2;
ground.receiveShadow = true;
scene.add(ground);

let mixer = null, action = null, catModel = null, animPlaying = false;

const loader = new GLTFLoader();
loader.load('space_cat.glb', (gltf) => {
  const model = gltf.scene;

  // Hide the Stars mesh — we use CSS background
  model.traverse(child => {
    if (child.name && child.name.toLowerCase().includes('star')) child.visible = false;
  });

  // Fit to screen
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const s = 2.4 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(s);
  model.position.set(-center.x * s, -box.min.y * s, -center.z * s);

  model.traverse(child => {
    if (child.isMesh) { child.castShadow = true; child.receiveShadow = true; }
  });

  scene.add(model);
  catModel = model;

  if (gltf.animations && gltf.animations.length > 0) {
    mixer = new THREE.AnimationMixer(model);
    action = mixer.clipAction(gltf.animations[0]);
    action.loop = THREE.LoopOnce;
    action.clampWhenFinished = true;
    action.play(); action.paused = true; action.time = 0;
    mixer.update(0);
  }

  const el = document.getElementById('loading');
  el.classList.add('gone');
  setTimeout(() => el.remove(), 1000);

}, (xhr) => {
  if (xhr.total)
    document.getElementById('loading').textContent = `loading... ${Math.round(xhr.loaded/xhr.total*100)}%`;
}, (err) => {
  document.getElementById('loading').textContent = 'error :(';
  console.error(err);
});

// Click → play anim
document.addEventListener('click', () => {
  document.getElementById('hint')?.classList.add('gone');
  if (!action || animPlaying) return;
  animPlaying = true;
  action.paused = false;
  action.timeScale = 1;
  action.time = 0;
  action.play();
  mixer.addEventListener('finished', () => {
    action.paused = true;
    action.time = 0;
    mixer.update(0);
    animPlaying = false;
  }, { once: true });
});

// Parallax
let mouseX = 0, mouseY = 0, prlxX = 0, prlxY = 0;
const starsBg = document.getElementById('stars-bg');
const starsFg = document.getElementById('stars-fg');
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
let idleT = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  idleT += dt;
  if (mixer) mixer.update(dt);
  if (catModel) {
    catModel.position.y += Math.sin(idleT * 0.6) * 0.0003;
    catModel.rotation.y = Math.sin(idleT * 0.3) * 0.04;
  }
  prlxX += (mouseX - prlxX) * 0.04;
  prlxY += (mouseY - prlxY) * 0.04;
  starsBg.style.transform = `translate(${prlxX * -12}px, ${prlxY * -8}px)`;
  starsFg.style.transform = `translate(${prlxX * -24}px, ${prlxY * -16}px)`;
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
