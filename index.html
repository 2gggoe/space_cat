<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>space cat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 100vw; height: 100vh; overflow: hidden; cursor: pointer; background: #000008; }
  canvas { display: block; }

  #stars-bg {
    position: fixed; inset: 0;
    background: url('stars.png') center/cover no-repeat;
    z-index: 0; opacity: 0.95;
  }
  #stars-fg {
    position: fixed; inset: 0;
    background: url('stars2.png') center/cover no-repeat;
    z-index: 0; opacity: 0.4; mix-blend-mode: screen;
  }
  #canvas-wrap { position: fixed; inset: 0; z-index: 1; }

  #hint {
    position: fixed; bottom: 36px; left: 50%;
    transform: translateX(-50%);
    color: rgba(255,255,255,0.22);
    font-family: 'Georgia', serif; font-size: 12px;
    letter-spacing: 0.35em; text-transform: uppercase;
    pointer-events: none; z-index: 10;
    transition: opacity 1.5s ease; user-select: none;
  }
  #hint.gone { opacity: 0; }

  #loading {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: #020a14; z-index: 99;
    color: rgba(255,255,255,0.2);
    font-family: 'Georgia', serif; font-size: 12px;
    letter-spacing: 0.35em; text-transform: uppercase;
    transition: opacity 1s ease;
  }
  #loading.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body>

<div id="stars-bg"></div>
<div id="stars-fg"></div>
<div id="canvas-wrap"></div>
<div id="loading">loading...</div>
<div id="hint">click anywhere</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
renderer.outputColorSpace = THREE.SRGBColorSpace;
renderer.setClearColor(0x000000, 0);
document.getElementById('canvas-wrap').appendChild(renderer.domElement);

const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(42, window.innerWidth / window.innerHeight, 0.01, 200);
// Closer camera, centered on cat
camera.position.set(0, 1.0, 3.2);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; controls.dampingFactor = 0.05;
controls.enableZoom = false; controls.enablePan = false;
controls.minPolarAngle = Math.PI * 0.2; controls.maxPolarAngle = Math.PI * 0.7;
controls.minAzimuthAngle = -Math.PI * 0.4; controls.maxAzimuthAngle = Math.PI * 0.4;
controls.target.set(0, 0.8, 0); controls.update();

// Lights — blue-tinted space feel
scene.add(new THREE.AmbientLight(0x8ab8ff, 2.5));

const key = new THREE.DirectionalLight(0xaaddff, 3.5);
key.position.set(-2, 4, 3);
key.castShadow = true;
key.shadow.mapSize.setScalar(1024);
key.shadow.camera.left=-2; key.shadow.camera.right=2;
key.shadow.camera.top=3; key.shadow.camera.bottom=-2;
key.shadow.bias = -0.001;
scene.add(key);

const fill = new THREE.DirectionalLight(0x4466ff, 1.5);
fill.position.set(3, 1, -1); scene.add(fill);

const front = new THREE.DirectionalLight(0xffffff, 1.2);
front.position.set(0, 0.5, 5); scene.add(front);

let mixer = null, action = null, catModel = null, animPlaying = false;

const loader = new GLTFLoader();
loader.load('space_cat.glb', (gltf) => {
  const model = gltf.scene;

  // Fit cat to screen
  const box = new THREE.Box3().setFromObject(model);
  const size = box.getSize(new THREE.Vector3());
  const center = box.getCenter(new THREE.Vector3());
  const s = 2.0 / Math.max(size.x, size.y, size.z);
  model.scale.setScalar(s);
  model.position.set(-center.x * s, -box.min.y * s, -center.z * s);

  model.traverse(child => {
    if (child.isMesh) {
      child.castShadow = true;
      // No shadow receiving — no ground plane needed
      child.receiveShadow = false;
    }
  });

  scene.add(model);
  catModel = model;

  // Animation
  if (gltf.animations && gltf.animations.length > 0) {
    mixer = new THREE.AnimationMixer(model);
    action = mixer.clipAction(gltf.animations[0]);
    action.loop = THREE.LoopOnce;
    action.clampWhenFinished = true;
    action.play(); action.paused = true; action.time = 0;
    mixer.update(0);
  }

  const el = document.getElementById('loading');
  el.classList.add('gone');
  setTimeout(() => el.remove(), 1000);

}, (xhr) => {
  if (xhr.total)
    document.getElementById('loading').textContent = `loading... ${Math.round(xhr.loaded/xhr.total*100)}%`;
}, (err) => {
  document.getElementById('loading').textContent = 'error :(';
  console.error(err);
});

// Click → play animation once
document.addEventListener('click', () => {
  document.getElementById('hint')?.classList.add('gone');
  if (!action || animPlaying) return;
  animPlaying = true;
  action.paused = false;
  action.timeScale = 1;
  action.time = 0;
  action.play();
  mixer.addEventListener('finished', () => {
    action.paused = true;
    action.time = 0;
    mixer.update(0);
    animPlaying = false;
  }, { once: true });
});

// Parallax stars on mouse move
let mouseX = 0, mouseY = 0, prlxX = 0, prlxY = 0;
const starsBg = document.getElementById('stars-bg');
const starsFg = document.getElementById('stars-fg');
document.addEventListener('mousemove', e => {
  mouseX = (e.clientX / window.innerWidth  - 0.5) * 2;
  mouseY = (e.clientY / window.innerHeight - 0.5) * 2;
});

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

const clock = new THREE.Clock();
let idleT = 0;
function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  idleT += dt;
  if (mixer) mixer.update(dt);

  // Gentle idle float
  if (catModel) {
    catModel.position.y += Math.sin(idleT * 0.55) * 0.0003;
    catModel.rotation.y = Math.sin(idleT * 0.28) * 0.035;
  }

  // Smooth parallax
  prlxX += (mouseX - prlxX) * 0.04;
  prlxY += (mouseY - prlxY) * 0.04;
  starsBg.style.transform = `translate(${prlxX * -12}px, ${prlxY * -8}px)`;
  starsFg.style.transform = `translate(${prlxX * -24}px, ${prlxY * -16}px)`;

  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
